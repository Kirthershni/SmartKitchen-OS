<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gourmet Hub | DNA Lab</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="lab_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <aside id="sidebar-container"></aside>

    <div class="main-wrapper">
        <header class="lab-header">
            <h1 class="logo">DNA<span>Lab</span></h1>
            <p id="mood-status">Analyze your pantry's genetic potential.</p>
        </header>

        <section class="full-width-scan">
            <div class="dna-input-zone">
                <div class="dna-hero-icon">🧬</div>
                
                <div class="scan-controls">
                    <input type="text" id="fridge-input" placeholder="Your ingredients will appear here...">
                    <button onclick="runDNALab()" class="btn-primary-lab compact">Initiate DNA Scan</button>
                </div>
                
                <div class="pantry-pills-container">
                    <p class="pantry-title">Common Pantry Items (Click to Add)</p>
                    <div class="pantry-line" id="pantry">
                        <div class="ing-chip" onclick="addToFridge('Potato')">🥔 Potato</div>
                        <div class="ing-chip" onclick="addToFridge('Egg')">🥚 Egg</div>
                        <div class="ing-chip" onclick="addToFridge('Milk')">🥛 Milk</div>
                        <div class="ing-chip" onclick="addToFridge('Cheese')">🧀 Cheese</div>
                        <div class="ing-chip" onclick="addToFridge('Garlic')">🧄 Garlic</div>
                        <div class="ing-chip" onclick="addToFridge('Rice')">🍚 Rice</div>
                        <div class="ing-chip" onclick="addToFridge('Bread')">🍞 Bread</div>
                        <div class="ing-chip" onclick="addToFridge('Butter')">🧈 Butter</div>
                        <div class="ing-chip" onclick="addToFridge('Capsicum')">🫑 Capsicum</div>
                    </div>
                </div>
                
                <button onclick="clearFridge()" class="btn-clear-lab">Clear All Markers</button>
            </div>

            <div id="lab-results" class="recipe-grid"></div>
        </section>
    </div>

    <div id="recipe-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="lab_script.js"></script>
    
    <script src="../sidebar.js"></script>
</body>
                </html>
